<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogistiKita - Kurir Lapangan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/login.css">
    <style>
        :root {
            --accent: #f97316; /* Orange */
            --accent-glow: rgba(249, 115, 22, 0.2);
        }
        .login-logo i { color: var(--accent); }
    </style>
</head>
<body>
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2" style="background: radial-gradient(circle, var(--accent-glow) 0%, rgba(6, 9, 19, 0) 70%);"></div>

    <div class="login-container">
        <div class="login-card">
            <!-- Brand Logo -->
            <div class="login-logo">
                <div class="logo-icon" style="background: rgba(249, 115, 22, 0.1); border: 1px solid rgba(249, 115, 22, 0.2);">
                    <i class="fas fa-motorcycle"></i>
                </div>
                <h1>Portal Kurir</h1>
                <p>Aplikasi Logistik Lapangan</p>
            </div>

            <!-- Login / Register Tabs -->
            <div class="auth-tabs" style="grid-template-columns: 1fr 1fr;">
                <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">Masuk</button>
                <button class="auth-tab" id="tab-kurir" onclick="switchAuthTab('kurir')">Daftar Kurir</button>
            </div>

            <!-- Alert Box for Info/Error -->
            <div id="alert-box" class="alert-box"></div>

            <!-- Form: Login -->
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" for="login-email">Email Kurir</label>
                    <div class="input-wrapper">
                        <input type="email" id="login-email" class="login-input" placeholder="kurir@logistikita.com" required>
                        <i class="fas fa-envelope"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="login-password">Kata Sandi</label>
                    <div class="input-wrapper">
                        <input type="password" id="login-password" class="login-input" placeholder="••••••••" required>
                        <i class="fas fa-lock"></i>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="btn-submit-login">
                    <i class="fas fa-right-to-bracket"></i>
                    <span>Masuk ke Dashboard</span>
                </button>
            </form>

            <!-- Form: Register Kurir -->
            <form id="kurir-form" class="register-form-section" style="display: none;" onsubmit="handleRegisterKurir(event)">
                <div class="form-group">
                    <label class="form-label" for="kurir-nama">Nama Lengkap</label>
                    <div class="input-wrapper">
                        <input type="text" id="kurir-nama" class="login-input" placeholder="Nama Lengkap Anda" required>
                        <i class="fas fa-user"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="kurir-email">Alamat Email</label>
                    <div class="input-wrapper">
                        <input type="email" id="kurir-email" class="login-input" placeholder="nama@email.com" required>
                        <i class="fas fa-envelope"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="kurir-password">Kata Sandi</label>
                    <div class="input-wrapper">
                        <input type="password" id="kurir-password" class="login-input" placeholder="Minimal 6 karakter" required minlength="6">
                        <i class="fas fa-lock"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="kurir-phone">Nomor Telepon</label>
                    <div class="input-wrapper">
                        <input type="text" id="kurir-phone" class="login-input" placeholder="0812-xxxx-xxxx" required>
                        <i class="fas fa-phone"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="kurir-vehicle">Tipe Kendaraan</label>
                    <div class="input-wrapper">
                        <select id="kurir-vehicle" class="login-input" required>
                            <option value="">— Pilih Kendaraan —</option>
                            <option value="Motor">Motor</option>
                            <option value="Mobil">Mobil (Van/Pickup)</option>
                            <option value="Truk">Truk Box</option>
                        </select>
                        <i class="fas fa-truck"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="kurir-plat">Plat Nomor (Opsional)</label>
                    <div class="input-wrapper">
                        <input type="text" id="kurir-plat" class="login-input" placeholder="B 1234 ABC">
                        <i class="fas fa-id-card"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="kurir-branch">Pilih Cabang (Area Kerja)</label>
                    <div class="input-wrapper">
                        <select id="kurir-branch" class="login-input" required>
                            <option value="">Memuat cabang...</option>
                        </select>
                        <i class="fas fa-building"></i>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="btn-submit-kurir" style="background: linear-gradient(135deg, var(--accent) 0%, #ea580c 100%);">
                    <i class="fas fa-motorcycle"></i>
                    <span>Daftar Sebagai Kurir</span>
                </button>
            </form>
        </div>
    </div>
    
    <script src="js/login.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if(typeof loadBranchesForKurir === 'function') {
                loadBranchesForKurir();
            }
        });
    </script>
</body>
</html>
