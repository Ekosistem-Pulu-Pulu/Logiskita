<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogistiKita - Admin Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/login.css">
    <style>
        :root {
            --accent: #d97706; /* Gold/Amber */
            --accent-glow: rgba(217, 119, 6, 0.2);
            --bg-card: rgba(10, 10, 10, 0.8);
        }
        .login-logo i { color: var(--accent); }
    </style>
</head>
<body>
    <div class="bg-glow-1" style="background: radial-gradient(circle, var(--accent-glow) 0%, rgba(6, 9, 19, 0) 70%);"></div>
    <div class="bg-glow-2"></div>

    <div class="login-container">
        <div class="login-card" style="border-top: 3px solid var(--accent);">
            <!-- Brand Logo -->
            <div class="login-logo">
                <div class="logo-icon" style="background: rgba(217, 119, 6, 0.1); border: 1px solid rgba(217, 119, 6, 0.2);">
                    <i class="fas fa-shield-halved"></i>
                </div>
                <h1>Admin</h1>
                <p>Otoritas Tertinggi Sistem LogistiKita</p>
            </div>

            <!-- Alert Box for Info/Error -->
            <div id="alert-box" class="alert-box"></div>

            <!-- Form: Login -->
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" for="login-email">Akses ID (Email)</label>
                    <div class="input-wrapper">
                        <input type="email" id="login-email" class="login-input" placeholder="superadmin@logistikita.com" required>
                        <i class="fas fa-envelope"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="login-password">Kata Sandi Akses</label>
                    <div class="input-wrapper">
                        <input type="password" id="login-password" class="login-input" placeholder="••••••••" required>
                        <i class="fas fa-lock"></i>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="btn-submit-login">
                    <i class="fas fa-fingerprint"></i>
                    <span>Otorisasi Akses</span>
                </button>
            </form>
        </div>
    </div>
    
    <script src="js/login.js"></script>
</body>
</html>
