<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogistiKita - Admin Cabang / Mitra Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/login.css">
    <style>
        :root {
            --accent: #2563eb; /* Professional Blue */
            --accent-glow: rgba(37, 99, 235, 0.2);
        }
        .login-logo i { color: var(--accent); }
    </style>
</head>
<body>
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2" style="background: radial-gradient(circle, var(--accent-glow) 0%, rgba(6, 9, 19, 0) 70%);"></div>

    <div class="login-container">
        <div class="login-card">
            <!-- Brand Logo -->
            <div class="login-logo">
                <div class="logo-icon" style="background: rgba(37, 99, 235, 0.1); border: 1px solid rgba(37, 99, 235, 0.2);">
                    <i class="fas fa-briefcase"></i>
                </div>
                <h1>Portal Admin</h1>
                <p>Manajemen Mitra & Cabang LogistiKita</p>
            </div>

            <!-- Alert Box for Info/Error -->
            <div id="alert-box" class="alert-box"></div>

            <!-- Form: Login -->
            <form id="login-form" onsubmit="handleRoleLogin(event, 'Admin')">
                <div class="form-group">
                    <label class="form-label" for="login-email">Email Admin</label>
                    <div class="input-wrapper">
                        <input type="email" id="login-email" class="login-input" placeholder="admin@logistikita.com" required>
                        <i class="fas fa-envelope"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="login-password">Kata Sandi</label>
                    <div class="input-wrapper">
                        <input type="password" id="login-password" class="login-input" placeholder="••••••••" required>
                        <i class="fas fa-lock"></i>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="btn-submit-login">
                    <i class="fas fa-right-to-bracket"></i>
                    <span>Masuk ke Dashboard</span>
                </button>
                <div style="text-align: center; margin-top: 15px; font-size: 0.85rem; color: var(--text-secondary);">
                    <a href="/" style="color: var(--text-secondary); text-decoration: none;"><i class="fas fa-arrow-left"></i> Kembali ke Beranda</a>
                </div>
            </form>
        </div>
    </div>
    
    <script src="js/login.js"></script>
    <script>
        function handleRoleLogin(e, roleName) {
            e.preventDefault();
            // Attach specific role marker if needed, or let the standard handleLogin do it
            // Assuming handleLogin is in login.js and it looks for #login-email and #login-password
            if(typeof handleLogin === 'function') {
                handleLogin(e);
            }
        }
    </script>
</body>
</html>
